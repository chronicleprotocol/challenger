name: Run Tests
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Code Linting & Unit Tests
    strategy:
      matrix:
        go-version: [ 1.24.x ]
        os: [ ubuntu-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744
        with:
          fetch-depth: '0'
      - name: Install Go
        uses: actions/setup-go@be3c94b385c4f180051c996d336f57a34c397495
        with:
          go-version: ${{ matrix.go-version }}
      - name: Linting Code
        uses: golangci/golangci-lint-action@55c2c1448f86e01eaae002a5a3a9624417608d84
        with:
          version: v1.64
          args: --timeout=10m0s
      - name: Build All Binaries
        run: go build ./...
