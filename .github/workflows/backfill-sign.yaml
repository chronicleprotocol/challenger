name: Backfill Sign
# RFC-044.3 one-time backfill: sign already-published prod/stage digests so
# Kyverno's verify-chronicle-release-images policy accepts them. Remove after use.
on:
  workflow_dispatch:
    inputs:
      images:
        description: "Space/newline separated repo@sha256:... digests to sign"
        type: string
        required: true
jobs:
  backfill:
    permissions:
      contents: read
      id-token: write
      packages: write
    runs-on: ubuntu-latest
    steps:
      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6
      - name: Sign digests
        env:
          IMAGES: ${{ inputs.images }}
        run: |
          set -euo pipefail
          for image in $IMAGES; do
            [ -z "$image" ] && continue
            case "$image" in *@sha256:*) ;; *) echo "Refusing non-digest: $image" >&2; exit 1;; esac
            echo "Signing $image"
            cosign sign --yes --recursive "$image"
          done
      - name: Verify against policy identity
        env:
          IMAGES: ${{ inputs.images }}
        run: |
          set -euo pipefail
          for image in $IMAGES; do
            [ -z "$image" ] && continue
            cosign verify \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              --certificate-identity-regexp "^https://github.com/chronicleprotocol/.+/.github/workflows/.+@refs/(heads|tags)/.+$" \
              "$image" >/dev/null
            echo "verified $image"
          done
